<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>請求書発行 - ほっともっと西淀川歌島店</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f0f2f5;color:#333;line-height:1.6}

/* ヘッダー */
.header{background:#1a73e8;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header h1{font-size:16px;font-weight:600}
.header-btn{background:rgba(255,255,255,.2);color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer}
.back-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;margin-right:8px;padding:0 4px}

/* 画面切替 */
.screen{display:none;padding:16px;max-width:800px;margin:0 auto}
.screen.active{display:block}

/* カード */
.card{background:#fff;border:1px solid #ddd;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:border-color .2s}
.card:hover{border-color:#1a73e8}
.card-title{font-size:15px;font-weight:700}
.card-sub{font-size:13px;color:#888;margin-top:2px}
.card-amount{font-size:17px;font-weight:700;color:#1a73e8;margin-top:4px}

/* ボタン */
.btn{display:block;width:100%;padding:14px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;text-align:center;margin-bottom:10px}
.btn-primary{background:#1a73e8;color:#fff}
.btn-primary:hover{background:#1557b0}
.btn-outline{background:#fff;color:#1a73e8;border:2px solid #1a73e8}
.btn-danger{background:#ff4444;color:#fff}
.btn-sm{display:inline-block;width:auto;padding:6px 14px;font-size:13px;margin:0}

/* 月切替 */
.month-nav{display:flex;align-items:center;justify-content:center;gap:16px;padding:12px 0;font-size:16px;font-weight:600}
.month-nav button{background:none;border:none;font-size:22px;color:#1a73e8;cursor:pointer;padding:0 8px}

/* 納品リスト */
.delivery-item{display:flex;align-items:center;background:#fff;border:1px solid #eee;border-radius:10px;padding:12px;margin-bottom:8px}
.delivery-item .di-main{flex:1}
.delivery-item .di-date{font-size:12px;color:#999}
.delivery-item .di-name{font-size:14px;font-weight:500}
.delivery-item .di-amount{font-size:15px;font-weight:700;color:#1a73e8;white-space:nowrap;margin-left:12px}
.delivery-item .di-actions{display:flex;gap:6px;margin-left:8px}
.delivery-item .di-actions button{background:none;border:none;font-size:16px;cursor:pointer;padding:4px}
.insert-btn-wrap{text-align:center;height:10px;position:relative;z-index:10;margin:-1px 0}
.insert-btn{background:none;border:none;color:#d0d0d0;font-size:16px;cursor:pointer;padding:2px 20px;line-height:1;transition:color .15s,transform .15s}
.insert-btn-wrap:hover .insert-btn,.insert-btn:active{color:#1a73e8;transform:scale(1.3)}

/* 合計バー */
.total-bar{background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px 16px;margin:12px 0;display:flex;justify-content:space-between;align-items:center;font-size:15px}
.total-bar .total-amount{font-size:20px;font-weight:700;color:#1a73e8}

/* モーダル */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.modal h3{margin-bottom:16px;font-size:17px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#555;margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #ccc;border-radius:8px;font-size:16px;-webkit-appearance:none}
.form-row{display:flex;gap:8px}
.form-row .form-group{flex:1}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions button{flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
.modal-cancel{background:#eee;border:none;color:#333}
.modal-ok{background:#1a73e8;border:none;color:#fff}

/* 設定 */
.setting-section{background:#fff;border:1px solid #ddd;border-radius:10px;padding:16px;margin-bottom:16px}
.setting-section h3{font-size:14px;margin-bottom:8px}
.setting-section p{font-size:12px;color:#666;margin-bottom:8px}
.gas-input{display:flex;gap:8px}
.gas-input input{flex:1}
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:12px;font-weight:600}
.status-badge.on{background:#e6f4ea;color:#1e8e3e}
.status-badge.off{background:#fce8e6;color:#d93025}

/* ===== 請求書プレビュー ===== */
.preview-wrap{background:#fff;padding:16px;border-radius:10px;overflow-x:auto}
#invoicePreview{width:210mm;min-height:297mm;padding:15mm 20mm 20mm;background:#fff;font-family:'Hiragino Mincho ProN','Yu Mincho','MS PMincho',serif;font-size:10.5pt;color:#000;line-height:1.6;position:relative}
.inv-date{text-align:right;font-size:10pt}
.inv-number{text-align:right;font-size:10pt;margin-bottom:20px}
.inv-title{text-align:center;font-size:22pt;font-weight:700;margin:20px 0 30px;letter-spacing:8px}
.inv-header{display:flex;justify-content:space-between;margin-bottom:20px}
.inv-left{flex:1;padding-right:20px}
.inv-right{width:250px;position:relative}
.inv-client{font-size:12pt;font-weight:700;border-bottom:1px solid #000;padding-bottom:4px;margin-bottom:12px;white-space:nowrap;overflow:visible}
.inv-subject{margin-bottom:8px;font-size:10pt}
.inv-intro{font-size:10pt;margin-bottom:16px}
.inv-total-display{font-size:16pt;font-weight:700;margin-bottom:8px}
.inv-total-display span{border-bottom:1px solid #000;padding-bottom:2px}
.inv-company-name{font-size:10pt;font-weight:600}
.inv-company-detail{font-size:9pt;line-height:1.5}

/* 会社印（SVG） */
.seal{position:absolute;top:0;right:0;width:60px;height:60px;opacity:.85}

/* 明細テーブル */
.inv-table{width:100%;border-collapse:collapse;margin:20px 0 10px;font-size:9.5pt}
.inv-table th{background:#f5f5f5;border:1px solid #999;padding:6px 8px;font-weight:600;text-align:center}
.inv-table td{border:1px solid #999;padding:6px 8px}
.col-name{width:55%;text-align:left}.col-mark{width:3%;text-align:center}.col-qty{width:10%;text-align:center}.col-price{width:16%;text-align:right}.col-amount{width:16%;text-align:right}
.empty-row td{height:24px}

/* 項目数に応じたコンパクトモード（13〜20件） */
#invoicePreview.inv-compact{min-height:auto}
#invoicePreview.inv-compact .inv-title{font-size:18pt;margin:12px 0 18px;letter-spacing:6px}
#invoicePreview.inv-compact .inv-header{margin-bottom:12px}
#invoicePreview.inv-compact .inv-table{font-size:8.5pt}
#invoicePreview.inv-compact .inv-table th,#invoicePreview.inv-compact .inv-table td{padding:3px 6px}
#invoicePreview.inv-compact .empty-row td{height:14px}
#invoicePreview.inv-compact .inv-summary{margin-top:6px}
#invoicePreview.inv-compact .inv-notes{margin-top:16px}

/* 超コンパクトモード（21〜30件） */
#invoicePreview.inv-compact-l{min-height:auto}
#invoicePreview.inv-compact-l .inv-title{font-size:16pt;margin:8px 0 14px;letter-spacing:4px}
#invoicePreview.inv-compact-l .inv-number{margin-bottom:10px}
#invoicePreview.inv-compact-l .inv-header{margin-bottom:8px}
#invoicePreview.inv-compact-l .inv-table{font-size:7.5pt}
#invoicePreview.inv-compact-l .inv-table th,#invoicePreview.inv-compact-l .inv-table td{padding:2px 4px}
#invoicePreview.inv-compact-l .empty-row td{height:0;padding:0}
#invoicePreview.inv-compact-l .inv-summary{margin-top:4px}
#invoicePreview.inv-compact-l .inv-summary-table{font-size:8.5pt}
#invoicePreview.inv-compact-l .inv-notes{margin-top:10px;font-size:8pt;line-height:1.5}
#invoicePreview.inv-compact-l .inv-bank{font-size:8pt;line-height:1.5}

/* 最大コンパクトモード（31件以上） */
#invoicePreview.inv-compact-xl{min-height:auto}
#invoicePreview.inv-compact-xl .inv-title{font-size:14pt;margin:6px 0 10px;letter-spacing:3px}
#invoicePreview.inv-compact-xl .inv-number{margin-bottom:8px}
#invoicePreview.inv-compact-xl .inv-header{margin-bottom:6px}
#invoicePreview.inv-compact-xl .inv-client{font-size:10pt;margin-bottom:8px}
#invoicePreview.inv-compact-xl .inv-total-display{font-size:13pt}
#invoicePreview.inv-compact-xl .inv-company-detail{font-size:8pt}
#invoicePreview.inv-compact-xl .inv-table{font-size:7pt}
#invoicePreview.inv-compact-xl .inv-table th,#invoicePreview.inv-compact-xl .inv-table td{padding:1.5px 3px}
#invoicePreview.inv-compact-xl .empty-row td{height:0;padding:0}
#invoicePreview.inv-compact-xl .inv-summary{margin-top:2px}
#invoicePreview.inv-compact-xl .inv-summary-table{font-size:8pt}
#invoicePreview.inv-compact-xl .inv-notes{margin-top:8px;font-size:7.5pt;line-height:1.4}
#invoicePreview.inv-compact-xl .inv-bank{font-size:7.5pt;line-height:1.4}
#invoicePreview.inv-compact-xl .seal{width:50px;height:50px}

.inv-summary{display:flex;justify-content:space-between;margin-top:10px}
.inv-summary-left{font-size:9pt}
.inv-summary-table{border-collapse:collapse;font-size:9.5pt}
.inv-summary-table td{padding:4px 12px;border:1px solid #999}
.inv-summary-table .label{text-align:left}
.inv-summary-table .value{text-align:right;min-width:100px}
.inv-notes{margin-top:30px;font-size:9pt;line-height:1.8}
.inv-bank{margin-top:10px;font-size:9pt;line-height:1.8}

/* レスポンシブ */
@media(max-width:600px){
  .form-row{flex-direction:column;gap:0}
  .preview-wrap{padding:8px;overflow:visible;position:relative}
  #invoicePreview{transform:scale(0.45);transform-origin:top left}
}
@media(min-width:601px) and (max-width:900px){
  #invoicePreview{transform:scale(0.65);transform-origin:top left}
  .preview-wrap{overflow:visible;position:relative}
}
.empty-msg{text-align:center;color:#999;padding:40px 0;font-size:14px}

/* 発行履歴 */
.history-card{background:#fff;border:1px solid #eee;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.history-card .hc-number{font-size:12px;color:#888}
.history-card .hc-date{font-size:12px;color:#888;margin-left:10px}
.history-card .hc-amount{font-size:16px;font-weight:700;color:#1a73e8;margin-top:4px}
.history-card .hc-subject{font-size:13px;color:#555;margin-top:2px}

/* 一括入力モーダル */
.bulk-row{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.bulk-row .br-date{flex:0 0 130px}
.bulk-row .br-price{flex:1;min-width:80px}
.bulk-row .br-del{background:none;border:none;color:#ff4444;font-size:18px;cursor:pointer;padding:2px 6px}
.bulk-common{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.bulk-common .form-group{flex:1;min-width:120px}

/* グラフ画面 */
#screen-chart canvas{max-width:100%;height:350px!important}
.chart-toggle{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.chart-toggle button{flex:1;padding:8px;border:2px solid #1a73e8;border-radius:8px;background:#fff;color:#1a73e8;font-size:13px;cursor:pointer;font-weight:600}
.chart-toggle button.active{background:#1a73e8;color:#fff}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="header" id="appHeader">
  <div style="display:flex;align-items:center">
    <button class="back-btn" id="backBtn" style="display:none" onclick="goBack()">&larr;</button>
    <h1 id="headerTitle">請求書発行</h1>
  </div>
  <button class="header-btn" id="settingsBtn" onclick="showScreen('settings')">設定</button>
</div>

<!-- ===== 画面1: 得意先一覧 ===== -->
<div id="screen-home" class="screen active">
  <div id="clientCards"></div>
  <button class="btn btn-outline" onclick="openClientModal()">+ 得意先を追加</button>
  <button class="btn btn-outline" style="margin-top:4px" onclick="showChartScreen(null)">📊 売上グラフ（全得意先）</button>
</div>

<!-- ===== 画面2: 得意先詳細（納品記録） ===== -->
<div id="screen-client" class="screen">
  <div class="month-nav">
    <button onclick="changeMonth(-1)">&lt;</button>
    <span id="monthLabel">2026年4月</span>
    <button onclick="changeMonth(1)">&gt;</button>
  </div>
  <div id="deliveryList"></div>
  <div class="total-bar">
    <span>当月合計</span>
    <span class="total-amount" id="monthTotal">¥ 0</span>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <button class="btn btn-primary" style="flex:2;margin:0" onclick="APP.insertBeforeId=null;openDeliveryModal()">+ 納品を追加</button>
    <button class="btn btn-outline" style="flex:1;margin:0" onclick="openBulkModal()">📋 一括入力</button>
  </div>
  <div class="setting-section" style="margin-top:12px">
    <div class="form-group" style="margin-bottom:10px">
      <label style="font-size:13px;font-weight:600">請求日</label>
      <input type="date" id="invDateInput">
    </div>
    <div class="form-group" style="margin-bottom:0">
      <label style="font-size:13px;font-weight:600">件名</label>
      <input type="text" id="invSubjectInput" placeholder="例: 3月納品分ご請求/お弁当代">
    </div>
  </div>
  <button class="btn btn-outline" onclick="generateInvoice()">請求書を発行</button>
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <button class="btn btn-outline" style="flex:1;margin:0" onclick="showHistoryScreen()">📋 発行履歴</button>
    <button class="btn btn-outline" style="flex:1;margin:0" onclick="showChartScreen(APP.currentClient ? APP.currentClient.id : null)">📊 グラフ</button>
  </div>
</div>

<!-- ===== 画面3: プレビュー ===== -->
<div id="screen-preview" class="screen">
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <button class="btn btn-primary" style="flex:1;margin:0" onclick="downloadPDF()">PDF ダウンロード</button>
    <button class="btn btn-danger" style="flex:1;margin:0" onclick="cancelInvoice()">この請求書を取消</button>
  </div>
  <div class="preview-wrap">
    <div id="invoicePreview"></div>
  </div>
</div>

<!-- ===== 画面: 発行履歴 ===== -->
<div id="screen-history" class="screen">
  <div id="historyList"></div>
</div>

<!-- ===== 画面: 売上グラフ ===== -->
<div id="screen-chart" class="screen">
  <div class="chart-toggle">
    <button id="chartBtnAll" class="active" onclick="renderChart(null)">全得意先</button>
    <div id="chartClientBtns" style="display:flex;gap:8px;flex:1;flex-wrap:wrap"></div>
  </div>
  <div style="background:#fff;border-radius:10px;padding:16px">
    <canvas id="salesChart"></canvas>
  </div>
  <p style="font-size:12px;color:#999;margin-top:8px;text-align:center">直近12ヶ月の月別売上（税込小計）</p>
</div>

<!-- ===== 設定画面 ===== -->
<div id="screen-settings" class="screen">
  <div class="setting-section">
    <h3>Google Apps Script 接続設定</h3>
    <p>デプロイURLを入力。未設定時はオフラインモード。</p>
    <div style="margin-bottom:8px">接続: <span id="connStatus" class="status-badge off">未接続</span></div>
    <div class="gas-input">
      <input type="url" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec">
      <button class="btn-sm btn-primary" onclick="saveGasUrl()">保存</button>
    </div>
  </div>
  <div class="setting-section">
    <h3>得意先管理</h3>
    <div id="clientManageList"></div>
    <button class="btn btn-outline" style="margin-top:12px" onclick="openClientModal()">+ 得意先を追加</button>
  </div>
  <div class="setting-section">
    <h3>バックアップ / 復元</h3>
    <p>全データをJSONファイルとして保存・復元できます。</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-sm btn-primary" onclick="exportData()">📤 エクスポート</button>
      <label class="btn-sm btn-outline" style="cursor:pointer;display:inline-block;padding:6px 14px;font-size:13px;border-radius:8px;border:2px solid #1a73e8;color:#1a73e8;background:#fff">
        📥 インポート<input type="file" accept=".json" style="display:none" onchange="importData(event)">
      </label>
    </div>
  </div>
  <div style="text-align:center;padding:16px 0;color:#aaa;font-size:12px">
    バージョン: <span id="appVersion">2.2.2</span> (2026-04-11)
  </div>
</div>

<!-- 得意先追加モーダル -->
<div id="clientModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('clientModal')">
  <div class="modal">
    <h3>得意先を追加</h3>
    <div class="form-group">
      <label>会社名</label>
      <input type="text" id="newClientName" placeholder="例: 株式会社サンゲツ 関西ロジスティクスセンター">
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('clientModal')">キャンセル</button>
      <button class="modal-ok" onclick="addClient()">追加</button>
    </div>
  </div>
</div>

<!-- 納品入力モーダル -->
<div id="deliveryModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('deliveryModal')">
  <div class="modal">
    <h3 id="deliveryModalTitle">納品を追加</h3>
    <input type="hidden" id="editDeliveryId">
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:14px;cursor:pointer;font-size:14px;font-weight:600;color:#1a73e8">
      <input type="checkbox" id="dlvAutoFill" onchange="toggleAutoFill()" style="width:20px;height:20px;accent-color:#1a73e8"> お弁当代で自動入力
    </label>
    <div class="form-group">
      <label>納品日</label>
      <input type="date" id="dlvDate">
    </div>
    <div class="form-group" id="dlvNameGroup">
      <label>品名</label>
      <input type="text" id="dlvName" placeholder="例: 弁当（配達）" maxlength="50" list="dlvNameList" oninput="autoFillPreset(this.value)">
      <datalist id="dlvNameList"></datalist>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>数量</label>
        <input type="number" id="dlvQty" value="1" min="1" inputmode="numeric">
      </div>
      <div class="form-group">
        <label>単価</label>
        <input type="number" id="dlvPrice" value="" min="0" inputmode="numeric" placeholder="金額">
      </div>
      <div class="form-group" id="dlvTaxGroup">
        <label>税率</label>
        <select id="dlvTax">
          <option value="8" selected>軽減8%</option>
          <option value="10">10%</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('deliveryModal')">キャンセル</button>
      <button class="modal-ok" onclick="saveDelivery()">保存</button>
    </div>
  </div>
</div>

<!-- 一括入力モーダル -->
<div id="bulkModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal('bulkModal')">
  <div class="modal">
    <h3>一括入力</h3>
    <label style="display:flex;align-items:center;gap:8px;margin-bottom:12px;cursor:pointer;font-size:14px;font-weight:600;color:#1a73e8">
      <input type="checkbox" id="bulkAutoFill" onchange="toggleBulkAutoFill()" style="width:20px;height:20px;accent-color:#1a73e8"> お弁当代で自動入力
    </label>
    <div class="bulk-common">
      <div class="form-group" id="bulkNameGroup">
        <label>品名（共通）</label>
        <input type="text" id="bulkName" placeholder="例: 弁当（配達）" maxlength="50" list="bulkNameList">
        <datalist id="bulkNameList"></datalist>
      </div>
      <div class="form-group" id="bulkTaxGroup">
        <label>税率（共通）</label>
        <select id="bulkTax">
          <option value="8" selected>軽減8%</option>
          <option value="10">10%</option>
        </select>
      </div>
    </div>
    <div id="bulkRows"></div>
    <button onclick="addBulkRow()" style="background:none;border:1px dashed #1a73e8;color:#1a73e8;width:100%;padding:8px;border-radius:8px;cursor:pointer;font-size:14px;margin-bottom:12px">+ 行を追加</button>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal('bulkModal')">キャンセル</button>
      <button class="modal-ok" onclick="saveBulkDeliveries()">一括保存</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// 状態管理
// ============================================================
const APP = {
  clients: [],       // [{id, name}]
  deliveries: [],    // [{id, clientId, date, name, qty, price, tax}]
  currentClient: null,
  currentYear: new Date().getFullYear(),
  currentMonth: new Date().getMonth() + 1,
  gasUrl: localStorage.getItem('gasUrl') || 'https://script.google.com/macros/s/AKfycbwU3ZI97dMOEo65ydHR9Xv3NBHV0Z6kwGpwvMpkVL5ztf19_CAiRslmpT1Bd2vVcUo0/exec',
  screenStack: ['home'],
  syncing: false,       // Bug1: 同期ロック
  syncingClients: false, // Bug4: クライアント同期ロック
  deviceId: localStorage.getItem('deviceId') || (function(){ const id = 'dev_' + Date.now().toString(36); localStorage.setItem('deviceId', id); return id; })()
};

// ============================================================
// 初期化
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('gasUrl').value = APP.gasUrl;
  updateConnStatus();
  loadClients();
  // Bug6: 初期表示時にクライアント管理リストも描画
  renderClientManage();
});

// Bug19: ブラウザ戻るボタン対応（カウンタ方式でgoBackとの二重実行を防止）
window.addEventListener('popstate', (e) => {
  if (APP._skipPopstate > 0) {
    APP._skipPopstate--;
    return;
  }
  if (APP.screenStack.length > 1) {
    saveInvInputs();
    APP.screenStack.pop();
    const prev = APP.screenStack[APP.screenStack.length - 1] || 'home';
    showScreen(prev, false);
  }
});

// ============================================================
// 画面遷移
// ============================================================
function showScreen(name, pushStack = true) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');

  const back = document.getElementById('backBtn');
  const title = document.getElementById('headerTitle');
  const settings = document.getElementById('settingsBtn');

  if (name === 'home') {
    back.style.display = 'none';
    title.textContent = '請求書発行';
    settings.style.display = '';
    APP.screenStack = ['home'];
  } else {
    back.style.display = '';
    settings.style.display = name === 'settings' ? 'none' : '';
    if (pushStack) {
      // 同じ画面の重複積み上げを防止（設定画面の繰り返し開き等）
      if (APP.screenStack[APP.screenStack.length - 1] !== name) {
        APP.screenStack.push(name);
        history.pushState({screen: name}, '');
      }
    }

    if (name === 'client') title.textContent = APP.currentClient ? APP.currentClient.name : '';
    else if (name === 'preview') title.textContent = '請求書プレビュー';
    else if (name === 'settings') title.textContent = '設定';
    else if (name === 'history') title.textContent = '発行履歴';
    else if (name === 'chart') title.textContent = '売上グラフ';
  }
}

function goBack() {
  // Bug20: 戻る前に入力値保存
  saveInvInputs();
  APP.screenStack.pop();
  const prev = APP.screenStack[APP.screenStack.length - 1] || 'home';
  showScreen(prev, false);
  // ブラウザ履歴も同期（popstate側でスキップするようカウンタ管理）
  APP._skipPopstate = (APP._skipPopstate || 0) + 1;
  history.back();
}

// ============================================================
// GAS通信
// ============================================================
function isOnline() { return !!APP.gasUrl; }

async function gasGet(params) {
  if (!isOnline()) return null;
  const url = new URL(APP.gasUrl);
  Object.keys(params).forEach(k => url.searchParams.append(k, params[k]));
  try { const r = await fetch(url); return await r.json(); } catch(e) { console.error(e); return null; }
}

async function gasPost(data) {
  if (!isOnline()) return null;
  try { const r = await fetch(APP.gasUrl, { method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(data) }); return await r.json(); } catch(e) { console.error(e); return null; }
}

function saveGasUrl() {
  APP.gasUrl = document.getElementById('gasUrl').value.trim();
  localStorage.setItem('gasUrl', APP.gasUrl);
  updateConnStatus();
  if (isOnline()) { loadClients(); alert('保存しました'); }
}

function updateConnStatus() {
  const b = document.getElementById('connStatus');
  if (isOnline()) { b.textContent = '接続済み'; b.className = 'status-badge on'; }
  else { b.textContent = '未接続'; b.className = 'status-badge off'; }
  // Bug16: ヘッダーにオフライン表示
  let offBadge = document.getElementById('offlineBadge');
  if (!isOnline()) {
    if (!offBadge) {
      offBadge = document.createElement('span');
      offBadge.id = 'offlineBadge';
      offBadge.style.cssText = 'background:#ff9800;color:#fff;font-size:11px;padding:2px 8px;border-radius:8px;margin-left:8px';
      offBadge.textContent = 'オフライン';
      document.getElementById('headerTitle').after(offBadge);
    }
  } else if (offBadge) {
    offBadge.remove();
  }
}

// ============================================================
// 得意先管理
// ============================================================
async function loadClients() {
  // まずローカルデータで即座に表示
  APP.clients = JSON.parse(localStorage.getItem('clients') || '[]');
  renderHome();
  // バックグラウンドでGASと同期（Bug4: マージ方式に変更）
  if (isOnline() && !APP.syncingClients) {
    APP.syncingClients = true;
    gasGet({action:'clients'}).then(d => {
      APP.syncingClients = false;
      if (d && d.clients) {
        const gasClients = d.clients;
        const gasIds = new Set(gasClients.map(c => c.id));
        // ローカルにしかない未同期クライアント（c_ prefix）を保持
        const localOnly = APP.clients.filter(c => c.id.startsWith('c_') && !gasIds.has(c.id));
        APP.clients = [...gasClients, ...localOnly];
        localStorage.setItem('clients', JSON.stringify(APP.clients));
        renderHome();
        renderClientManage();
      }
    });
  }
}

function renderHome() {
  const deliveries = getAllDeliveries();
  const now = new Date();
  const ym = now.getFullYear() * 100 + now.getMonth() + 1;

  const html = APP.clients.map(c => {
    const monthDlvs = deliveries.filter(d => {
      if (d.clientId !== c.id) return false;
      const dp = parseDateParts(d.date);
      return (dp.y * 100 + dp.m) === ym;
    });
    let total = monthDlvs.reduce((s, d) => s + d.qty * d.price, 0);
    // M-4: 外税得意先は税込合計を表示
    if (c.taxMode === 'exclusive' && total > 0) {
      const taxGrp = {};
      monthDlvs.forEach(d => { const r = d.tax || 8; taxGrp[r] = (taxGrp[r]||0) + d.qty * d.price; });
      Object.keys(taxGrp).forEach(r => { total += Math.round(taxGrp[r] * parseInt(r) / 100); });
    }
    const count = monthDlvs.length;
    return '<div class="card" onclick="openClient(\'' + c.id + '\')" style="position:relative">' +
      '<button onclick="event.stopPropagation();deleteClient(\'' + c.id + '\')" style="position:absolute;top:8px;right:8px;background:none;border:none;color:#ccc;font-size:18px;cursor:pointer;padding:4px 8px">&#10005;</button>' +
      '<div class="card-title">' + esc(c.name) + '</div>' +
      '<div class="card-sub">今月: ' + count + '件' + (c.taxMode === 'exclusive' ? '（外税）' : '') + '</div>' +
      (total > 0 ? '<div class="card-amount">¥ ' + total.toLocaleString() + '</div>' : '') +
      '</div>';
  }).join('');

  document.getElementById('clientCards').innerHTML = html || '<div class="empty-msg">得意先を追加してください</div>';
}

function openClientModal() {
  document.getElementById('newClientName').value = '';
  document.getElementById('clientModal').style.display = 'flex';
  document.getElementById('newClientName').focus();
}

function addClient() {
  const name = document.getElementById('newClientName').value.trim();
  if (!name) return;
  // Bug18: 得意先名重複チェック
  if (APP.clients.some(c => c.name === name)) {
    alert('同じ名前の得意先が既に存在します');
    return;
  }
  const id = 'c_' + Date.now();
  APP.clients.push({id, name});
  localStorage.setItem('clients', JSON.stringify(APP.clients));
  closeModal('clientModal');
  renderHome();
  renderClientManage();
  if (isOnline()) gasPost({action:'addClient', name}).then(r => {
    if (r && r.success && r.id) {
      const oldId = id;
      const c = APP.clients.find(x => x.id === oldId);
      if (c) {
        c.id = r.id;
        localStorage.setItem('clients', JSON.stringify(APP.clients));
        // Bug2: 納品データのclientIdも更新
        let deliveries = getAllDeliveries();
        let changed = false;
        deliveries.forEach(d => { if (d.clientId === oldId) { d.clientId = r.id; changed = true; } });
        if (changed) saveAllDeliveries(deliveries);
        // C-2: 現在開いている得意先のIDも更新
        if (APP.currentClient && APP.currentClient.id === oldId) {
          APP.currentClient.id = r.id;
        }
        renderHome();
        renderClientManage();
      }
    }
  });
}

function deleteClient(id) {
  if (!confirm('この得意先を削除しますか？\n関連する納品記録もすべて削除されます。')) return;
  APP.clients = APP.clients.filter(c => c.id !== id);
  localStorage.setItem('clients', JSON.stringify(APP.clients));
  // Bug11: 関連する納品データも削除
  let deliveries = getAllDeliveries();
  deliveries = deliveries.filter(d => d.clientId !== id);
  saveAllDeliveries(deliveries);
  renderHome();
  renderClientManage();
  if (isOnline()) gasPost({action:'deleteClient', id});
}

function renderClientManage() {
  const div = document.getElementById('clientManageList');
  if (!APP.clients.length) { div.innerHTML = '<p style="color:#999;font-size:13px">得意先なし</p>'; return; }
  div.innerHTML = APP.clients.map(c => {
    const isExclusive = c.taxMode === 'exclusive';
    return '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #eee">' +
      '<span style="font-size:14px;flex:1">' + esc(c.name) + '</span>' +
      '<label style="display:flex;align-items:center;gap:4px;font-size:12px;color:#555;margin-right:10px;cursor:pointer">' +
        '<input type="checkbox" ' + (isExclusive ? 'checked' : '') + ' onchange="toggleTaxMode(\'' + c.id + '\',this.checked)" style="accent-color:#1a73e8"> 外税' +
      '</label>' +
      '<button class="btn-sm btn-danger" onclick="deleteClient(\'' + c.id + '\')">削除</button></div>';
  }).join('');
}

// ============================================================
// 得意先詳細画面
// ============================================================
function openClient(id) {
  // Bug20: 画面切替前に請求日・件名を保存
  saveInvInputs();
  APP.currentClient = APP.clients.find(c => c.id === id);
  if (!APP.currentClient) return;
  APP.currentYear = new Date().getFullYear();
  APP.currentMonth = new Date().getMonth() + 1;
  showScreen('client');
  loadDeliveries();
  restoreInvInputs();
}

// Bug20: 請求日・件名の保存/復元
function saveInvInputs() {
  if (!APP.currentClient) return;
  const key = 'invInputs_' + APP.currentClient.id + '_' + APP.currentYear + '_' + APP.currentMonth;
  const dateEl = document.getElementById('invDateInput');
  const subjEl = document.getElementById('invSubjectInput');
  if (dateEl && subjEl) {
    localStorage.setItem(key, JSON.stringify({date: dateEl.value, subject: subjEl.value}));
  }
}
function restoreInvInputs() {
  if (!APP.currentClient) return;
  const key = 'invInputs_' + APP.currentClient.id + '_' + APP.currentYear + '_' + APP.currentMonth;
  const saved = localStorage.getItem(key);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      const dateEl = document.getElementById('invDateInput');
      const subjEl = document.getElementById('invSubjectInput');
      if (dateEl && data.date) dateEl.value = data.date;
      if (subjEl && data.subject) subjEl.value = data.subject;
    } catch(e) {}
  }
}

function changeMonth(delta) {
  // Bug10: 切替前に現在の入力値を保存
  saveInvInputs();
  APP.currentMonth += delta;
  if (APP.currentMonth > 12) { APP.currentMonth = 1; APP.currentYear++; }
  if (APP.currentMonth < 1) { APP.currentMonth = 12; APP.currentYear--; }
  // リセット後にloadDeliveriesでデフォルト値がセットされる
  document.getElementById('invDateInput').value = '';
  document.getElementById('invSubjectInput').value = '';
  loadDeliveries();
  // 保存値がある場合のみ復元（空文字保存はデフォルト値を消さないよう除外）
  const key = 'invInputs_' + (APP.currentClient ? APP.currentClient.id : '') + '_' + APP.currentYear + '_' + APP.currentMonth;
  const saved = localStorage.getItem(key);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      const dateEl = document.getElementById('invDateInput');
      const subjEl = document.getElementById('invSubjectInput');
      if (dateEl && data.date) dateEl.value = data.date;
      if (subjEl && data.subject) subjEl.value = data.subject;
    } catch(e) {}
  }
}

function normalizeDate(d) {
  if (!d) return '';
  if (typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)) return d;
  const dt = new Date(d);
  if (isNaN(dt)) return String(d);
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}

function loadDeliveries() {
  renderDeliveries();
  if (!isOnline() || !APP.currentClient) return;
  // Bug1: 同期ロックでレースコンディション防止
  // H-6: 10秒以上経過した場合はロック解除（固着防止）
  if (APP.syncing) {
    if (APP.syncStartTime && Date.now() - APP.syncStartTime > 10000) {
      APP.syncing = false;
    } else {
      return;
    }
  }
  APP.syncing = true;
  APP.syncStartTime = Date.now();
  const syncClientId = APP.currentClient.id;
  gasGet({action:'deliveries', clientId: syncClientId}).then(d => {
    APP.syncing = false;
    // 同期完了時にクライアントが変わっていたら破棄
    if (!APP.currentClient || APP.currentClient.id !== syncClientId) return;
    if (d && d.deliveries) {
      const gasDeliveries = d.deliveries.map(item => ({
        id: item.id,
        clientId: item.clientId,
        date: normalizeDate(item.date),
        name: item.name,
        qty: parseInt(item.qty) || 1,
        price: parseInt(item.price) || 0,
        tax: parseInt(item.tax) || 8
      }));
      let all = getAllDeliveries();
      const localOnly = all.filter(x => x.clientId !== syncClientId);
      const gasIds = new Set(gasDeliveries.map(x => x.id));
      // M-2: 未同期ローカルデータは作成後5分以内のもののみ保持（古いd_はGAS側で削除済みと判断）
      const now = Date.now();
      const unsyncedLocal = all.filter(x => {
        if (x.clientId !== syncClientId || !x.id.startsWith('d_') || gasIds.has(x.id)) return false;
        const ts = parseInt(x.id.replace('d_', ''), 10);
        return !isNaN(ts) && (now - ts) < 300000;
      });
      saveAllDeliveries([...localOnly, ...gasDeliveries, ...unsyncedLocal]);
      renderDeliveries();
    }
  }).catch(() => { APP.syncing = false; });
}

function getClientMonthDeliveries() {
  if (!APP.currentClient) return [];
  const all = getAllDeliveries();
  return all.filter(d => {
    if (d.clientId !== APP.currentClient.id) return false;
    const dp = parseDateParts(d.date);
    return dp.y === APP.currentYear && dp.m === APP.currentMonth;
  });
}

// ============================================================
// 納品記録 CRUD
// ============================================================
function getAllDeliveries() {
  return JSON.parse(localStorage.getItem('deliveries') || '[]');
}

function saveAllDeliveries(list) {
  // Bug15: localStorage容量チェック
  try {
    localStorage.setItem('deliveries', JSON.stringify(list));
  } catch(e) {
    console.error('localStorage save error:', e);
    alert('データの保存に失敗しました。ストレージの容量が不足している可能性があります。');
  }
}

function openDeliveryModalAt(idx) {
  const items = getClientMonthDeliveries();
  items.sort((a, b) => a.date.localeCompare(b.date));
  const ref = items[idx];
  APP.insertBeforeId = ref ? ref.id : null;
  openDeliveryModal();
  if (ref) document.getElementById('dlvDate').value = ref.date;
}

function openDeliveryModal() {
  document.getElementById('editDeliveryId').value = '';
  document.getElementById('deliveryModalTitle').textContent = APP.insertBeforeId ? '納品を挿入' : '納品を追加';
  // H-7: 過去月閲覧時に存在しない日付にならないよう補正
  const todayDay = new Date().getDate();
  const lastDayOfMonth = new Date(APP.currentYear, APP.currentMonth, 0).getDate();
  const safeDay = Math.min(todayDay, lastDayOfMonth);
  document.getElementById('dlvDate').value = APP.currentYear + '-' + String(APP.currentMonth).padStart(2,'0') + '-' + String(safeDay).padStart(2,'0');
  document.getElementById('dlvName').value = '';
  document.getElementById('dlvQty').value = '1';
  document.getElementById('dlvPrice').value = '';
  document.getElementById('dlvTax').value = '8';
  // 自動入力チェック状態を復元
  const autoFill = localStorage.getItem('autoFill') === '1';
  document.getElementById('dlvAutoFill').checked = autoFill;
  if (autoFill) applyAutoFill();
  if (typeof updatePresetDatalist === 'function') updatePresetDatalist();
  document.getElementById('deliveryModal').style.display = 'flex';
  if (autoFill) document.getElementById('dlvPrice').focus();
  else document.getElementById('dlvName').focus();
}

function toggleAutoFill() {
  const checked = document.getElementById('dlvAutoFill').checked;
  localStorage.setItem('autoFill', checked ? '1' : '0');
  if (checked) {
    applyAutoFill();
    document.getElementById('dlvPrice').focus();
  } else {
    document.getElementById('dlvName').value = '';
    document.getElementById('dlvName').readOnly = false;
    document.getElementById('dlvName').style.background = '';
    document.getElementById('dlvTax').disabled = false;
    document.getElementById('dlvQty').value = '1';
  }
}

function applyAutoFill() {
  document.getElementById('dlvName').value = '弁当（配達）';
  document.getElementById('dlvName').readOnly = true;
  document.getElementById('dlvName').style.background = '#f0f0f0';
  document.getElementById('dlvTax').value = '8';
  document.getElementById('dlvTax').disabled = true;
  document.getElementById('dlvQty').value = '1';
}

function editDelivery(id) {
  const all = getAllDeliveries();
  const d = all.find(x => x.id === id);
  if (!d) return;
  APP.insertBeforeId = null; // 編集時は挿入モードをクリア
  document.getElementById('editDeliveryId').value = id;
  document.getElementById('deliveryModalTitle').textContent = '納品を編集';
  document.getElementById('dlvAutoFill').checked = false;
  document.getElementById('dlvName').readOnly = false;
  document.getElementById('dlvName').style.background = '';
  document.getElementById('dlvTax').disabled = false;
  document.getElementById('dlvDate').value = d.date;
  document.getElementById('dlvName').value = d.name;
  document.getElementById('dlvQty').value = d.qty;
  document.getElementById('dlvPrice').value = d.price;
  document.getElementById('dlvTax').value = String(d.tax);
  if (typeof updatePresetDatalist === 'function') updatePresetDatalist();
  document.getElementById('deliveryModal').style.display = 'flex';
}

function saveDelivery() {
  const editId = document.getElementById('editDeliveryId').value;
  const dateVal = document.getElementById('dlvDate').value;
  const nameVal = document.getElementById('dlvName').value.trim();
  const qtyVal = parseInt(document.getElementById('dlvQty').value);
  const priceVal = parseInt(document.getElementById('dlvPrice').value);
  const taxVal = document.getElementById('dlvAutoFill').checked ? 8 : parseInt(document.getElementById('dlvTax').value);

  // Bug7: 日付バリデーション
  if (!dateVal) { alert('納品日を入力してください'); return; }
  const dateObj = new Date(dateVal);
  if (isNaN(dateObj.getTime())) { alert('有効な日付を入力してください'); return; }
  // Bug13: 品名バリデーション
  if (!nameVal) { alert('品名を入力してください'); return; }
  if (nameVal.length > 50) { alert('品名は50文字以内にしてください'); return; }
  // Bug9: 数量・単価バリデーション
  if (!qtyVal || qtyVal < 1) { alert('数量は1以上を入力してください'); return; }
  if (isNaN(priceVal) || priceVal < 1) { alert('単価は1以上を入力してください'); return; }

  const d = {
    id: editId || 'd_' + Date.now(),
    clientId: APP.currentClient.id,
    date: dateVal,
    name: nameVal,
    qty: qtyVal,
    price: priceVal,
    tax: taxVal
  };

  let all = getAllDeliveries();
  if (editId) {
    const idx = all.findIndex(x => x.id === editId);
    if (idx >= 0) all[idx] = d;
  } else if (APP.insertBeforeId) {
    const idx = all.findIndex(x => x.id === APP.insertBeforeId);
    if (idx >= 0) all.splice(idx, 0, d);
    else all.push(d);
  } else {
    all.push(d);
  }
  APP.insertBeforeId = null;
  saveAllDeliveries(all);

  // Bug5: GAS保存エラーを通知
  if (isOnline()) gasPost({action:'saveDelivery', ...d}).then(r => {
    if (r && r.error) {
      alert('サーバー同期エラー: ' + r.error + '\nローカルには保存済みです。');
    } else if (r && r.success && r.id && r.id !== d.id) {
      let updated = getAllDeliveries();
      const item = updated.find(x => x.id === d.id);
      if (item) { item.id = r.id; saveAllDeliveries(updated); renderDeliveries(); }
    }
  }).catch(e => {
    console.error('GAS sync error:', e);
    alert('サーバーへの同期に失敗しました。\nローカルには保存済みです。次回接続時に再同期されます。');
  });

  // 品名プリセット保存（autoFillモード以外）
  if (!document.getElementById('dlvAutoFill').checked) {
    saveClientPreset(APP.currentClient.id, nameVal, priceVal, taxVal);
  }

  closeModal('deliveryModal');
  renderDeliveries();
  renderHome();
}

function deleteDelivery(id) {
  if (!confirm('この納品記録を削除しますか？')) return;
  let all = getAllDeliveries();
  all = all.filter(x => x.id !== id);
  saveAllDeliveries(all);
  if (isOnline()) gasPost({action:'deleteDelivery', id});
  renderDeliveries();
  renderHome();
}

// ============================================================
// 請求書生成
// ============================================================
function generateInvoice() {
  const items = getClientMonthDeliveries();
  if (!items.length) { alert('この月の納品記録がありません'); return; }

  items.sort((a, b) => a.date.localeCompare(b.date));

  const client = APP.currentClient.name;
  const y = APP.currentYear;
  const m = APP.currentMonth;

  // 請求日：入力値 or デフォルト（翌月1日）
  const invDateRaw = document.getElementById('invDateInput').value;
  let invDateStr;
  if (invDateRaw) {
    const parts = invDateRaw.split('-');

  const devSuffix = APP.deviceId.slice(-4);

  let maxSeq = 0;

  issued.forEach(n => { const match = n.match(new RegExp('^' + invNumPrefix + '-(\\d{3,})[^0-9]')); if (match) { const s = parseInt(match[1],10); if (s > maxSeq) maxSeq = s; }});
  const invNumber = invNumPrefix + '-' + String(maxSeq + 1).padStart(3, '0') + '_' + devSuffix;
  issued.push(invNumber);
  localStorage.setItem('issuedNumbers', JSON.stringify(issued));
  APP.lastInvoiceNumber = invNumber;

  // 件名：入力値 or デフォルト

  // 集計
  let subtotal = 0;

  items.forEach(d => {
    const amt = d.qty * d.price;
    subtotal += amt;
    if (!taxGroups[d.tax]) taxGroups[d.tax] = 0;
    taxGroups[d.tax] += amt;
  });

  // 外税の場合は税額を別途計算
  let totalTax = 0;
  if (taxMode === 'exclusive') {
    Object.keys(taxGroups).forEach(rate => {
      totalTax += Math.round(taxGroups[rate] * parseInt(rate) / 100);
    });
  }
  const grandTotal = taxMode === 'exclusive' ? subtotal + totalTax : subtotal;

  const hasReduced = items.some(d => d.tax === 8);

  // 明細行
  // 項目数に応じたサイズクラスを決定
  const itemCount = items.length;

    sizeClass = 'inv-compact'; minRows = Math.max(itemCount, 20);
  }

  let rows = items.map(d => {
    const amt = d.qty * d.price;
    const dateLabel = d.date.replace(/(\d{4})-(\d{2})-(\d{2})/, '$1/$2/$3');
    const mark = d.tax === 8 ? '※' : '';

      '<td class="col-mark">' + mark + '</td>' +
      '<td class="col-qty">' + d.qty.toLocaleString() + '</td>' +
      '<td class="col-price">' + d.price.toLocaleString() + '</td>' +
      '<td class="col-amount">' + amt.toLocaleString() + '</td></tr>';
  }).join('');

  for (let i = items.length; i < minRows; i++) {
    rows += '<tr class="empty-row"><td></td><td></td><td></td><td></td><td></td></tr>';
  }

  // 税内訳
  let taxRows = '';
  if (taxMode === 'exclusive') {
    Object.keys(taxGroups).sort().forEach(rate => {
      const taxAmt = Math.round(taxGroups[rate] * parseInt(rate) / 100);
      const label = rate === '8' ? '消費税 (軽減8%)' : '消費税 (10%)';
      taxRows += '<tr><td class="label">' + label + '</td><td class="value">' + taxAmt.toLocaleString() + '</td></tr>';
    });

    Object.keys(taxGroups).sort().forEach(rate => {
      const taxAmt = Math.floor(taxGroups[rate] * parseInt(rate) / (100 + parseInt(rate)));

      taxRows += '<tr><td class="label">' + label + '</td><td class="value">(' + taxAmt.toLocaleString() + ')</td></tr>';
    });
  }

  // サイズクラスを適用
  const previewEl = document.getElementById('invoicePreview');
  previewEl.className = sizeClass;

  previewEl.innerHTML =
    '<div class="inv-date">' + invDateStr + '</div>' +
    '<div class="inv-number">請求番号: ' + invNumber + '</div>' +
    '<div class="inv-title">請 求 書</div>' +
    '<div class="inv-header">' +
    '<div class="inv-left">' +
    '<div class="inv-client">' + esc(client) + ' 御中</div>' +
    '<div class="inv-subject">件名 : ' + esc(subject) + '</div>' +
    '<div class="inv-intro">下記のとおりご請求申し上げます。</div>' +
    '<div class="inv-total-display">ご請求金額 <span>¥ ' + grandTotal.toLocaleString() + ' -</span></div>' +
    '</div>' +
    '<div class="inv-right">' +
    '<div class="inv-company-name">株式会社フィプロ</div>' +
    '<div class="inv-company-name">ほっともっと西淀川歌島店</div>' +
    '<div class="inv-company-detail">' +
    '〒555-0021<br>大阪府大阪市西淀川区歌島<br>2-3-8<br><br>' +
    'TEL: 06-6476-1131<br>FAX: 06-7668-1135<br>登録番号: T4290001066306</div>' +
    '<div class="seal">' +
    '<svg viewBox="0 0 100 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">' +
    '<rect x="2" y="2" width="96" height="96" fill="none" stroke="#cc0000" stroke-width="4" rx="3"/>' +
    '<text fill="#cc0000" font-family="serif" font-weight="900" font-size="20" text-anchor="middle">' +
    '<tspan x="62" y="24">株</tspan><tspan x="62" y="44">式</tspan><tspan x="62" y="64">会</tspan><tspan x="62" y="84">社</tspan>' +
    '</text>' +
    '<text fill="#cc0000" font-family="serif" font-weight="900" font-size="20" text-anchor="middle">' +
    '<tspan x="38" y="24">フ</tspan><tspan x="38" y="44">ィ</tspan><tspan x="38" y="64">プ</tspan><tspan x="38" y="84">ロ</tspan>' +
    '</text>' +
    '</svg></div>' +
    '</div></div>' +
    '<table class="inv-table"><thead><tr>' +
    '<th class="col-name">品番・品名</th><th class="col-mark"></th>' +
    '<th class="col-qty">数量</th><th class="col-price">単価</th><th class="col-amount">金額</th>' +
    '</tr></thead><tbody>' + rows + '</tbody></table>' +
    '<div class="inv-summary">' +
    '<div class="inv-summary-left">' + (hasReduced ? '<p>※は軽減税率対象です。</p>' : '') + '</div>' +
    '<table class="inv-summary-table">' +
    '<tr><td class="label">小計</td><td class="value">' + subtotal.toLocaleString() + '</td></tr>' +
    taxRows +
    '<tr style="font-weight:700"><td class="label">合計</td><td class="value">' + grandTotal.toLocaleString() + '</td></tr>' +
    '</table></div>' +
    '<div class="inv-notes">日毎の弁当内容につきましては、納品書にてご確認ください。<br>' +
    '恐れ入りますが、振込手数料はお客様のご負担でお願いいたします。</div>' +
    '<div class="inv-bank"><strong>お振込先：</strong><br>' +
    '三菱UFJ銀行 福岡中央支店 （普）0043573 株式会社プレナス</div>';

  // 請求書履歴に保存
  const historyEntry = {
    number: invNumber,
    clientId: APP.currentClient.id,
    clientName: APP.currentClient.name,
    date: invDateRaw || (function(){ let iy=y,im=m+1; if(im>12){im=1;iy++;} return iy+'-'+String(im).padStart(2,'0')+'-01'; })(),
    amount: grandTotal,
    subject: subject,
    year: y,
    month: m
  };
  const invoiceHistory = JSON.parse(localStorage.getItem('invoiceHistory') || '[]');
  invoiceHistory.push(historyEntry);
  localStorage.setItem('invoiceHistory', JSON.stringify(invoiceHistory));

  showScreen('preview');

  // モバイルプレビューの高さを動的調整
  setTimeout(() => {
    const wrap = previewEl.closest('.preview-wrap');
    if (wrap) {

      const scale = w <= 600 ? 0.45 : w <= 900 ? 0.65 : 1;
      if (scale < 1) {

// ============================================================
// PDF
// ============================================================
function downloadPDF() {
  const el = document.getElementById('invoicePreview');
  const wrap = el.closest('.preview-wrap');

  // 元のスタイルを保存
  const origStyle = el.getAttribute('style') || '';
  const origWrapH = wrap ? wrap.style.height : '';

  // スマホのscale変換を解除、min-heightも解除
  el.style.transform = 'none';
  el.style.minHeight = 'auto';
  if (wrap) wrap.style.height = 'auto';

  function restoreStyle() {
    // H-4: スタイル復元後にスマホのscaleも再適用
    el.removeAttribute('style');
    if (origStyle) el.setAttribute('style', origStyle);
    if (wrap) wrap.style.height = origWrapH;
    // scaleに応じたwrap高さを再計算
    setTimeout(() => {
      if (wrap) {
        const w = window.innerWidth;
        const sc = w <= 600 ? 0.45 : w <= 900 ? 0.65 : 1;
        if (sc < 1) {
          wrap.style.height = (el.scrollHeight * sc + 20) + 'px';
        } else {
          wrap.style.height = '';
        }
      }
    }, 50);
  }

  // #7: スタイル変更後にブラウザの再描画を待ってからキャプチャ
  requestAnimationFrame(function() { setTimeout(function() {
  html2canvas(el, {scale:2, useCORS:true, backgroundColor:'#ffffff'}).then(function(canvas) {
    try {
      const pdf = new jspdf.jsPDF({unit:'mm', format:'a4', orientation:'portrait'});
      const a4W = 210, a4H = 297;
      const imgW = canvas.width, imgH = canvas.height;
      const scale = Math.min(a4W / (imgW / 2), a4H / (imgH / 2));
      const pdfW = (imgW / 2) * scale;
      const pdfH = (imgH / 2) * scale;
      pdf.addImage(canvas.toDataURL('image/jpeg', 0.98), 'JPEG', 0, 0, pdfW, pdfH);
      // H-3: ファイル名に得意先名・年月を含める
      const pdfClient = APP.currentClient ? APP.currentClient.name : '請求書';
      const pdfYM = APP.currentYear + String(APP.currentMonth).padStart(2,'0');
      pdf.save(pdfClient + '_' + pdfYM + '.pdf');
    } catch(e) {
      console.error('PDF generation error:', e);
      alert('PDF生成に失敗しました: ' + e.message);
    }
    restoreStyle();
  }).catch(function(e) {
    console.error('html2canvas error:', e);
    alert('請求書の画像化に失敗しました。もう一度お試しください。');
    restoreStyle();
  });
  }, 50); });
}

// #8: YYYY-MM-DD文字列から年月日を安全にパース（UTC解釈を回避）
function parseDateParts(dateStr) {
  if (!dateStr) return {y:0, m:0, d:0};
  const p = String(dateStr).split('-');
  return {y: parseInt(p[0],10)||0, m: parseInt(p[1],10)||0, d: parseInt(p[2],10)||0};
}

function saveClientPreset(clientId, name, price, tax) {
  if (!clientId || !name) return;
  const key = 'clientPresets_' + clientId;
  const presets = JSON.parse(localStorage.getItem(key) || '[]');
  const idx = presets.findIndex(p => p.name === name);
  if (idx >= 0) {
    presets[idx] = {name, price, tax};
  } else {
    presets.push({name, price, tax});
  }
  localStorage.setItem(key, JSON.stringify(presets));
}

function getClientPresets(clientId) {
  if (!clientId) return [];
  return JSON.parse(localStorage.getItem('clientPresets_' + clientId) || '[]');
}

  if (!APP.currentClient) return;

function exportData() {
  // Bug#5: clientPresetsも含める
  const clients = JSON.parse(localStorage.getItem('clients') || '[]');
  const clientPresets = {};
  clients.forEach(c => {
    const p = localStorage.getItem('clientPresets_' + c.id);
    if (p) clientPresets[c.id] = JSON.parse(p);
  });
  const data = {
    version: '2.2.1',
    exportedAt: new Date().toISOString(),
    clients: clients,
    deliveries: JSON.parse(localStorage.getItem('deliveries') || '[]'),
    invoiceHistory: JSON.parse(localStorage.getItem('invoiceHistory') || '[]'),
    issuedNumbers: JSON.parse(localStorage.getItem('issuedNumbers') || '[]'),
    clientPresets: clientPresets
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  a.download = '請求書データ_' + now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.clients && !data.deliveries) {
        alert('有効なバックアップファイルではありません');
        return;
      }
      if (!confirm('現在のデータをバックアップファイルで上書きしますか？\nこの操作は元に戻せません。')) return;
      if (data.clients) localStorage.setItem('clients', JSON.stringify(data.clients));
      if (data.deliveries) localStorage.setItem('deliveries', JSON.stringify(data.deliveries));
      if (data.invoiceHistory) localStorage.setItem('invoiceHistory', JSON.stringify(data.invoiceHistory));
      if (data.issuedNumbers) localStorage.setItem('issuedNumbers', JSON.stringify(data.issuedNumbers));
      // Bug#5: clientPresetsも復元
      if (data.clientPresets) {
        Object.keys(data.clientPresets).forEach(cid => {
          localStorage.setItem('clientPresets_' + cid, JSON.stringify(data.clientPresets[cid]));
        });
      }
      APP.clients = JSON.parse(localStorage.getItem('clients') || '[]');
      // Bug#8: currentClientをリセット
      APP.currentClient = null;
      renderHome();
      renderClientManage();
      alert('インポートが完了しました');
      showScreen('home');
    } catch(err) {
      alert('ファイルの読み込みに失敗しました: ' + err.message);
    }
  };
  reader.readAsText(file);
  // input値をリセット（同じファイルを再選択可能に）
  event.target.value = '';
}

  for (let i = 0; i < rowArr.length; i++) {
    const row = rowArr[i];
    const dateVal = row.querySelector('.br-date').value;
    const priceVal = parseInt(row.querySelector('.br-price').value);
    const qtyVal = parseInt(row.querySelector('.br-qty').value) || 1;
    if (!row.querySelector('.br-price').value) continue; // 単価未入力はスキップ
    if (!dateVal) { alert((i+1) + '行目: 日付を入力してください'); return; }
    if (isNaN(priceVal) || priceVal < 1) { alert((i+1) + '行目: 単価は1以上を入力してください'); return; }
    newItems.push({
      id: 'd_' + (Date.now() + i),
      clientId: APP.currentClient.id,
      date: dateVal,
      name: commonName,
      qty: qtyVal,
      price: priceVal,
      tax: commonTax
    });
  }
  if (!newItems.length) { alert('入力されている行がありません'); return; }

  let all = getAllDeliveries();
  all = all.concat(newItems);
  saveAllDeliveries(all);

  // プリセット保存
  if (!isAutoFill) {
    newItems.forEach(item => saveClientPreset(APP.currentClient.id, item.name, item.price, item.tax));
  }

  // GAS同期
  if (isOnline()) {
    newItems.forEach(item => gasPost({action:'saveDelivery', ...item}));
  }

  closeModal('bulkModal');
  renderDeliveries();
  renderHome();
  alert(newItems.length + '件を保存しました');
}

// ============================================================
// 機能6: 売上グラフ
// ============================================================
let salesChartInstance = null;

function showChartScreen(clientId) {
  APP.chartClientId = clientId;
  showScreen('chart');
  // クライアントボタンを更新
  const btnsDiv = document.getElementById('chartClientBtns');
  btnsDiv.innerHTML = APP.clients.map(c =>
    '<button onclick="renderChart(\'' + c.id + '\')" id="chartBtn_' + c.id + '" style="flex:1;padding:8px;border:2px solid #1a73e8;border-radius:8px;background:#fff;color:#1a73e8;font-size:12px;cursor:pointer;font-weight:600">' + esc(c.name) + '</button>'
  ).join('');
  renderChart(clientId);
}

function renderChart(clientId) {
  APP.chartClientId = clientId;
  // ボタンのアクティブ状態
  document.getElementById('chartBtnAll').className = clientId === null ? 'active' : '';
  document.getElementById('chartBtnAll').style.cssText = clientId === null ? 'flex:1;padding:8px;border:2px solid #1a73e8;border-radius:8px;background:#1a73e8;color:#fff;font-size:13px;cursor:pointer;font-weight:600' : 'flex:1;padding:8px;border:2px solid #1a73e8;border-radius:8px;background:#fff;color:#1a73e8;font-size:13px;cursor:pointer;font-weight:600';
  APP.clients.forEach(c => {
    const btn = document.getElementById('chartBtn_' + c.id);
    if (btn) btn.style.background = (clientId === c.id) ? '#1a73e8' : '#fff';
    if (btn) btn.style.color = (clientId === c.id) ? '#fff' : '#1a73e8';
  });

  // 直近12ヶ月のラベル生成
  const labels = [];
  const monthKeys = [];
  const now = new Date();
  for (let i = 11; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    labels.push(d.getFullYear() + '/' + String(d.getMonth()+1).padStart(2,'0'));
    monthKeys.push({y: d.getFullYear(), m: d.getMonth()+1});
  }

  const deliveries = getAllDeliveries();
  const COLORS = ['#1a73e8','#e84343','#34a853','#ff9800','#9c27b0','#00bcd4','#795548','#607d8b'];

  let datasets;
  if (clientId === null) {
    // 全得意先を色分け積み上げ
    datasets = APP.clients.map((c, ci) => {
      const data = monthKeys.map(({y, m}) => {
        return deliveries.filter(d => {
          if (d.clientId !== c.id) return false;
          const dp = parseDateParts(d.date);
          return dp.y === y && dp.m === m;
        }).reduce((s, d) => s + d.qty * d.price, 0);
      });
      return {label: c.name, data, backgroundColor: COLORS[ci % COLORS.length]};
    });
  } else {
    // 単一得意先
    const c = APP.clients.find(x => x.id === clientId);
    const data = monthKeys.map(({y, m}) => {
      return deliveries.filter(d => {
        if (d.clientId !== clientId) return false;
        const dp = parseDateParts(d.date);
        return dp.y === y && dp.m === m;
      }).reduce((s, d) => s + d.qty * d.price, 0);
    });
    datasets = [{label: c ? c.name : clientId, data, backgroundColor: '#1a73e8'}];
  }

  const ctx = document.getElementById('salesChart').getContext('2d');
  if (salesChartInstance) salesChartInstance.destroy();
  salesChartInstance = new Chart(ctx, {
    type: 'bar',
    data: {labels, datasets},
    options: {
      responsive: true,
      plugins: {
        legend: {display: datasets.length > 1},
        tooltip: {
          callbacks: {
            label: ctx => ctx.dataset.label + ': ¥' + ctx.raw.toLocaleString()
          }
        }
      },
      scales: {
        x: {stacked: clientId === null},
        y: {
          stacked: clientId === null,
          ticks: {callback: v => '¥' + v.toLocaleString()}
        }
      }
    }
  });
}

// ============================================================
// 機能7: 外税モード切替
// ============================================================
function toggleTaxMode(clientId, isExclusive) {
  const c = APP.clients.find(x => x.id === clientId);
  if (!c) return;
  c.taxMode = isExclusive ? 'exclusive' : 'inclusive';
  localStorage.setItem('clients', JSON.stringify(APP.clients));
  renderHome();
  if (isOnline()) gasPost({action:'updateClient', id: c.id, name: c.name, taxMode: c.taxMode});
}

// ============================================================
// 納品リスト描画（複製ボタン付き）
// ============================================================
function renderDeliveries() {
  document.getElementById('monthLabel').textContent = APP.currentYear + '年' + APP.currentMonth + '月';

  const all = getClientMonthDeliveries();
  all.sort((a, b) => a.date.localeCompare(b.date));

  if (!all.length) {
    document.getElementById('deliveryList').innerHTML = '<div class="empty-msg">この月の納品記録はありません</div>';
    document.getElementById('monthTotal').textContent = '¥ 0';
    return;
  }

  let total = 0;
  const html = all.map((d, idx) => {
    const amt = d.qty * d.price;
    total += amt;
    const dateStr = d.date.replace(/(\d{4})-(\d{2})-(\d{2})/, '$2/$3');
    const insertBtn = '<div class="insert-btn-wrap">' +
      '<button class="insert-btn" onclick="openDeliveryModalAt(' + idx + ')" title="ここに追加">＋</button></div>';
    return insertBtn +
      '<div class="delivery-item">' +
      '<div class="di-main">' +
      '<div class="di-date">' + dateStr + '</div>' +
      '<div class="di-name">' + esc(d.name) + (d.tax === 8 ? ' ※' : '') + '</div>' +
      '</div>' +
      '<div class="di-amount">¥ ' + amt.toLocaleString() + '</div>' +
      '<div class="di-actions">' +
      '<button onclick="copyDelivery(\'' + d.id + '\')" title="コピー">📋</button>' +
      '<button onclick="editDelivery(\'' + d.id + '\')" title="編集">&#9998;</button>' +
      '<button onclick="deleteDelivery(\'' + d.id + '\')" title="削除" style="color:#ff4444">&#10005;</button>' +
      '</div></div>';
  }).join('');

  const lastInsertBtn = '<div class="insert-btn-wrap">' +
    '<button class="insert-btn" onclick="openDeliveryModalAt(' + all.length + ')" title="ここに追加">＋</button></div>';
  document.getElementById('deliveryList').innerHTML = html + lastInsertBtn;
  document.getElementById('monthTotal').textContent = '¥ ' + total.toLocaleString();

  const invDateEl = document.getElementById('invDateInput');
  const invSubjectEl = document.getElementById('invSubjectInput');
  if (invDateEl && !invDateEl.value) {
    let iy = APP.currentYear, im = APP.currentMonth + 1;
    if (im > 12) { im = 1; iy++; }
    invDateEl.value = iy + '-' + String(im).padStart(2,'0') + '-01';
  }
  if (invSubjectEl && !invSubjectEl.value) {
    invSubjectEl.value = APP.currentMonth + '月納品分ご請求/お弁当代';
  }
}

// Escapeキーでモーダルを閉じる
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    ['deliveryModal', 'clientModal', 'bulkModal'].forEach(id => {
      if (document.getElementById(id).style.display !== 'none') closeModal(id);
    });
  }
});
